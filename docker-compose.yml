services:
  api:
    build: .
    restart: unless-stopped
    ports:
      - 8080:8080
    environment:
      - DATABASE_URL=postgres://foodapp:foodapp@postgres:5432/foodapp?sslmode=disable
      - REDIS_ADDR=redis:6379
      - COUPON_CACHE_PATH=/var/lib/foodapp/coupon_cache.bin
    volumes:
      - coupon_cache:/var/lib/foodapp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: foodapp
      POSTGRES_PASSWORD: foodapp
      POSTGRES_DB: foodapp
    ports:
      - 5433:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foodapp -d foodapp"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:
  coupon_cache:
